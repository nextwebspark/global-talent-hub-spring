# ── DEV profile ───────────────────────────────────────────────────────────────
# Activate: SPRING_PROFILES_ACTIVE=dev (also the default if unset).

# CORS — local React dev servers.
app.cors.allowed-origins=http://localhost:3000,http://localhost:5000,http://localhost:5173

# Verbose-ish logging + show SQL for debugging.
logging.level.com.globaltalenthub=DEBUG
logging.level.org.hibernate.SQL=WARN
spring.jpa.show-sql=true
