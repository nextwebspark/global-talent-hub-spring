# ── PROD profile ──────────────────────────────────────────────────────────────
# Activate: SPRING_PROFILES_ACTIVE=prod
# Required env in prod: DATABASE_URL, APP_JWT_SECRET, GOOGLE_CLOUD_PROJECT,
# MAPBOX_ACCESS_TOKEN, APP_CORS_ALLOWED_ORIGINS, (optional) CLOCKWORK_* keys.

# CORS — set to the real frontend origin(s), comma-separated. No localhost in prod.
# Cannot be "*" because credentials are allowed.
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS}

# Require SSL to the database.
spring.datasource.hikari.maximum-pool-size=20

# Quieter logging; never show SQL in prod.
logging.level.com.globaltalenthub=INFO
logging.level.org.hibernate.SQL=WARN
spring.jpa.show-sql=false
