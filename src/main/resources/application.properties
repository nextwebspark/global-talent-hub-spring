# ── Base config (all profiles) ─────────────────────────────────────────────
# Active profile: set SPRING_PROFILES_ACTIVE=dev or prod (defaults to dev).
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}
spring.application.name=global-talent-hub

# ── Server ──────────────────────────────────────────────────────────────────
server.port=${PORT:5000}

# ── Datasource (Postgres) ─────────────────────────────────────────────────────
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.maximum-pool-size=10

# ── JPA / Hibernate ───────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── Tomcat ────────────────────────────────────────────────────────────────────
server.max-http-request-header-size=175536

# ── File uploads ──────────────────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ── Vertex AI Gemini ──────────────────────────────────────────────────────────
spring.ai.vertex.ai.gemini.project-id=${GOOGLE_CLOUD_PROJECT:}
spring.ai.vertex.ai.gemini.location=${GOOGLE_CLOUD_LOCATION:us-central1}
spring.ai.vertex.ai.gemini.chat.options.model=${ENRICHMENT_MODEL:gemini-2.5-pro}

# ── App ───────────────────────────────────────────────────────────────────────
# App-owned JWT (HS256). Secret signs + verifies our own tokens — replaces Supabase.
# Must be >= 32 bytes for HS256. Set APP_JWT_SECRET in every non-test profile.
app.jwt.secret=${APP_JWT_SECRET:placeholder-for-tests}
# Token lifetime in seconds (default 7 days).
app.jwt.expiry-seconds=${APP_JWT_EXPIRY_SECONDS:604800}
app.fast-model=${FAST_MODEL:gemini-2.5-flash}
# Per-call LLM timeout (ms). Bounds each Gemini call so a hung request can't pin the SSE worker.
app.llm.call-timeout-ms=${LLM_CALL_TIMEOUT_MS:30000}
app.upload-dir=${UPLOAD_DIR:./uploads}
app.clockwork.base-url=${CLOCKWORK_BASE_URL:https://api.clockworkrecruiting.com}
