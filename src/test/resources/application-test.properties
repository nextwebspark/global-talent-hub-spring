# ── TEST profile (unit tests; activated by surefire) ──────────────────────────
# Vertex AI Gemini needs GCP credentials at startup; not available in unit tests.
# AiConfig + LlmService are @Profile("!test"); unit tests mock LlmClassifier.
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.vertexai.gemini.VertexAiGeminiAutoConfiguration

# In-memory H2 datasource.
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Placeholder values for tests.
spring.ai.vertex.ai.gemini.project-id=test-project
spring.ai.vertex.ai.gemini.location=us-central1
app.jwt.secret=test-secret-key-that-is-at-least-32-bytes-long-for-hs256
MAPBOX_ACCESS_TOKEN=test-token
